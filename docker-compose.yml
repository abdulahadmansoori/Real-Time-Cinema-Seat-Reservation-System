services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: cinema
      POSTGRES_DB: cinema
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema -d cinema"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api1:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://cinema:cinema@postgres:5432/cinema?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: docker-dev-jwt-secret-change-me
      ADMIN_EMAIL: admin@cinema.local
      ADMIN_PASSWORD: Admin123!
      PARTNER_API_KEY: partner-dev-key-change-me
      RESERVATION_TTL_MS: "300000"
      API_PORT: "4000"
      CORS_ORIGIN: http://localhost:3000,http://localhost
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api2:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://cinema:cinema@postgres:5432/cinema?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: docker-dev-jwt-secret-change-me
      ADMIN_EMAIL: admin@cinema.local
      ADMIN_PASSWORD: Admin123!
      PARTNER_API_KEY: partner-dev-key-change-me
      RESERVATION_TTL_MS: "300000"
      API_PORT: "4000"
      CORS_ORIGIN: http://localhost:3000,http://localhost
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - nginx

volumes:
  pgdata:
